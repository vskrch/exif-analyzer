<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXIF Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>EXIF Analyzer</h1>
            <p>Upload an image to view its EXIF metadata</p>
            <span class="version-badge">v2.0</span>
        </header>

        <section class="upload-section">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </div>
                <h3>Drag & Drop your image here</h3>
                <p>or click to browse</p>
                <p class="file-types">JPG, PNG, TIFF, WebP, HEIC, BMP, GIF &mdash; Max 25MB</p>
                <input type="file" id="fileInput" accept="image/*">
                <button class="btn" onclick="document.getElementById('fileInput').click()">
                    Choose Image
                </button>
            </div>
        </section>

        <div class="error" id="errorBox" role="alert"></div>

        <section class="preview-section" id="previewSection">
            <div class="preview-container">
                <div class="image-preview">
                    <img id="imagePreview" src="" alt="Preview">
                    <div class="image-meta" id="imageMeta"></div>
                </div>
                <div class="image-info" id="exifData">
                    <div class="loading">Analyzing EXIF data...</div>
                </div>
            </div>
        </section>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
